# Common pipe-delimited highlighting for all DAVIT logs
colorscheme:davit-base
# Timestamp (field 1)
cs_re_s:cyan:^([^|]+)
# USER (field 2)
#cs_re_s:magenta:\|\s*([^|]+)\s*\|

# LEVEL (field 3) – whole-line severity coloring
cs_re:red:\|\s*(ERROR|FATAL|CRITICAL)\s*\|
cs_re:yellow:\|\s*(WARN|WARNING)\s*\|
cs_re:green:\|\s*(INFO|OK|DEBUG)\s*\|
cs_re:gray:\|\s*(TRACE|VERBOSE)\s*\|

# CATEGORY / SUBCAT (fields 4-5)
cs_re_s:blue:\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|

# pid= / script= / MODE= (key=value pairs)
cs_re_s:white:(\b(pid|script|MODE)=[^|]+)

# Message (last field) – default
cs_re_s:white:\|\s*(.+)$
